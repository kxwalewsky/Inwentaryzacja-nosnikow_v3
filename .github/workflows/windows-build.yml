name: Build Windows installer

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-windows:
    name: Build .exe and .msi
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm install

      - name: Check installed Tauri CLI
        run: npm list @tauri-apps/cli

      - name: Build Tauri Windows installer
        run: npm exec tauri build -- --target x86_64-pc-windows-msvc

      - name: Upload Windows installers
        uses: actions/upload-artifact@v4
        with:
          name: Repetytorium-POS-Windows
          path: |
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/**/*.exe
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/**/*.msi
            src-tauri/target/release/bundle/**/*.exe
            src-tauri/target/release/bundle/**/*.msi
          if-no-files-found: error
