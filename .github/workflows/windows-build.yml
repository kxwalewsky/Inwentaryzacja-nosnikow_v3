name: Build Windows installer

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Clean npm cache
        run: npm cache clean --force

      - name: Install frontend dependencies
        run: npm install --no-audit --no-fund

      - name: Build Tauri Windows installer
        run: npm run tauri:build -- --target x86_64-pc-windows-msvc

      - name: Show generated files
        if: always()
        shell: pwsh
        run: |
          Write-Host "Files in src-tauri/target:"
          if (Test-Path "src-tauri/target") {
            Get-ChildItem -Path "src-tauri/target" -Recurse | Select-Object FullName
          } else {
            Write-Host "src-tauri/target does not exist"
          }

      - name: Upload generated Windows files
        uses: actions/upload-artifact@v4
        with:
          name: Repetytorium-POS-Windows
          path: |
            src-tauri/target/release/*.exe
            src-tauri/target/release/bundle/**/*.exe
            src-tauri/target/release/bundle/**/*.msi
          if-no-files-found: error
